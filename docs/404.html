<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Nil Segu</title>
    <script>
        const loc = window.location
        const origin = loc.origin;
        const path = loc.href.substr(origin.length);
        const url = origin + "/" + '?p=' + encodeURIComponent(path);
        loc.replace(url);
    </script>
</head>

<body></body>

</html>
